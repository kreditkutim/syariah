<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hitung Cicilan - KSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="info-box">
      <h2>Simulasi Cicilan</h2>

      <label for="hargaBarang">Harga Barang:</label>
      <input
        type="text"
        id="hargaBarang"
        class="format-rupiah"
        placeholder="Contoh: 10.000.000"
      />

      <label for="lamaCicilan">Lama Cicilan (bulan):</label>
      <input type="number" id="lamaCicilan" placeholder="Contoh: 10" />

      <label for="dp">DP (boleh tanpa DP):</label>
      <input
        type="text"
        id="dp"
        class="format-rupiah"
        placeholder="Contoh: 1.000.000"
      />

      <button onclick="hitungCicilan()" class="btn-primary">
        HITUNG CICILAN
      </button>

      <div id="hasilCicilan"></div>
    </div>

    <script>
      console.log("Script Simulasi jalan...");

      // === 1. Format angka ribuan saat diketik ===
      document.querySelectorAll(".format-rupiah").forEach((input) => {
        input.addEventListener("input", function () {
          let angka = this.value.replace(/[^0-9]/g, "");
          this.value = formatAngka(angka);
        });
      });

      function formatAngka(angka) {
        return angka.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      }

      // === 2. Ambil nilai asli untuk perhitungan ===
      function getAngka(id) {
        const val = document.getElementById(id).value;
        return parseFloat(val.replace(/\./g, "")) || 0;
      }

      // === 3. Hitung Cicilan (Logika Asli Kamu) ===
      function pembulatanRibuan(nilai) {
        return Math.floor(nilai / 1000) * 1000;
      }

      function hitungCicilan() {
        const harga = getAngka("hargaBarang");
        const lama = parseInt(document.getElementById("lamaCicilan").value);
        const dp = getAngka("dp");
        const hasil = document.getElementById("hasilCicilan");

        if (isNaN(harga) || isNaN(lama) || harga === 0) {
          alert("Harap isi Harga dan Lama Cicilan.");
          return;
        }

        if (lama > 12) {
          hasil.style.display = "block";
          hasil.style.background = "transparent"; // Reset background jika error
          hasil.innerHTML =
            "<h3 style='color:red; text-align:center;'>Maaf, lebih 12 bulan hubungi Admin.</h3>";
          return;
        }

        // Rumus sesuai permintaan
        const hargaSetelahDP = harga - dp;
        const faktor = lama <= 5 ? 1.1 : 1 + lama * 0.02;
        const hargaJualSementara = hargaSetelahDP * faktor;
        const cicilanAwal = hargaJualSementara / lama;
        const cicilanFinal = pembulatanRibuan(cicilanAwal);
        const hargaJualFinal = cicilanFinal * lama;

        const tanggalSekarang = new Date();
        // Mengikuti logika kamu: lama + 1 bulan ke depan
        tanggalSekarang.setMonth(tanggalSekarang.getMonth() + (lama + 1));
        const opsiTanggal = { month: "long", year: "numeric" };
        const batasAkhir = tanggalSekarang.toLocaleDateString(
          "id-ID",
          opsiTanggal,
        );

        // Tampilkan Hasil dengan Style yang rapi dan KONTRAS
        hasil.style.display = "block";
        hasil.style.background = "#28a745"; // Hijau Syariah
        hasil.style.padding = "15px";
        hasil.style.borderRadius = "10px";
        hasil.style.marginTop = "20px";
        hasil.style.border = "2px solid #ffffff";
        hasil.style.boxShadow = "0 4px 10px rgba(0,0,0,0.3)";

       // Kita paksa warna putih di setiap baris pakai inline style color: #fff !important
        hasil.innerHTML = `
      <h4 style="text-align:center; color: #fff !important; border-bottom: 1px solid rgba(255,255,255,0.5); padding-bottom: 5px; margin: 0 0 10px 0; font-size: 0.95rem; letter-spacing: 1px;">HASIL SIMULASI KSS</h4>
      
      <p style="margin: 0 0 5px 0; color: #fff !important; font-size: 0.85rem; line-height: 1.2;">
        <b>HARGA JUAL:</b><br>
        <p style="margin: 2px 0 0 0; font-size: 1.8rem; color: #ffeb3b !important; font-weight: bold; text-shadow: 2px 2px 3px #000;">Rp ${hargaJualFinal.toLocaleString("id-ID")}</span>
      </p>
            <div style="text-align: center; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 6px; border: 1px dashed rgba(255,255,255,0.4);">
          <p style="margin: 0; color: #fff !important; font-size: 0.8rem; font-weight: bold;">ANGSURAN PER BULAN:</p>
          <p style="margin: 2px 0 0 0; font-size: 1.8rem; color: #ffeb3b !important; font-weight: bold; text-shadow: 2px 2px 3px #000;">
            Rp ${cicilanFinal.toLocaleString("id-ID")}
          </p>
          <p style="margin: 0 0 10px 0; color: #fff !important; font-size: 0.85rem; line-height: 1.2;">
        <b>Lunas Pada:</b><br>
        <span style="font-size: 1rem;">${batasAkhir}</span>
      </p>
      </div>
      
      <p style="font-size: 0.65rem; margin-top: 8px; text-align:center; color: #fff !important; opacity: 0.8; font-style: italic; line-height: 1;">
        *Estimasi pembulatan ribuan ke bawah
      </p>
    `;
      } // <--- KURUNG PENUTUP FUNGSI INI TADI YANG HILANG BRO
    </script>
  </body>
</html>
